<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Iniciar sesión — Concursos Guatecompras</title>
  <meta name="theme-color" content="#1a5276" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #1a5276, #103a54); padding: 20px; }
    .card { background: #fff; width: 100%; max-width: 360px; border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25); }
    .logo { width: 64px; height: 64px; margin: 0 auto 12px; display: block; }
    h1 { text-align: center; font-size: 20px; color: #1a5276; margin: 0 0 4px; }
    .sub { text-align: center; color: #777; font-size: 13px; margin: 0 0 20px; }
    label { display: block; font-size: 13px; color: #444; margin: 12px 0 4px; }
    input { width: 100%; padding: 12px; border: 1px solid #cfd8dd; border-radius: 10px; font-size: 15px; }
    input:focus { outline: none; border-color: #1a5276; }
    button { width: 100%; margin-top: 20px; padding: 13px; border: 0; border-radius: 10px; background: #1a5276;
      color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: .6; }
    .error { background: #fdecea; color: #b71c1c; padding: 10px; border-radius: 8px; font-size: 13px;
      margin-top: 14px; display: none; }
    .pie { text-align: center; color: #aaa; font-size: 11px; margin-top: 18px; }
  </style>
</head>
<body>
  <form class="card" id="form" onsubmit="entrar(event)">
    <svg class="logo" viewBox="0 0 512 512" aria-hidden="true">
      <rect width="512" height="512" rx="96" fill="#1a5276"/>
      <path d="M256 80 C 256 80, 130 250, 130 330 a 126 126 0 0 0 252 0 C 382 250, 256 80, 256 80 Z" fill="#fff"/>
    </svg>
    <h1>Concursos Guatecompras</h1>
    <p class="sub">Inicia sesión para continuar</p>

    <label for="usuario">Usuario</label>
    <input id="usuario" name="usuario" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" required />

    <label for="clave">Contraseña</label>
    <input id="clave" name="clave" type="password" autocomplete="current-password" required />

    <button id="btn" type="submit">Entrar</button>
    <div class="error" id="error"></div>
    <p class="pie">Acceso privado</p>
  </form>

  <script>
    async function entrar(ev) {
      ev.preventDefault();
      var btn = document.getElementById("btn");
      var err = document.getElementById("error");
      err.style.display = "none";
      btn.disabled = true; btn.textContent = "Entrando…";
      try {
        var r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            usuario: document.getElementById("usuario").value,
            clave: document.getElementById("clave").value,
          }),
        });
        if (r.ok) { window.location.replace("/"); return; }
        var d = {};
        try { d = await r.json(); } catch (e) {}
        err.textContent = d.error || "No se pudo iniciar sesión.";
        err.style.display = "block";
      } catch (e) {
        err.textContent = "Error de conexión. Intenta de nuevo.";
        err.style.display = "block";
      } finally {
        btn.disabled = false; btn.textContent = "Entrar";
      }
    }
  </script>
</body>
</html>
